# Pucho alembic config.
#
# The DSN is read from config.settings at runtime (see env.py); this file
# only carries alembic's own bookkeeping paths.

[alembic]
script_location = alembic
prepend_sys_path = .
# `sqlalchemy.url` is intentionally empty — env.py builds the URL from
# config.settings.settings.SQLALCHEMY_DATABASE_URI.
sqlalchemy.url =

# File-template for new revisions (matches senior-engineer doc:
# "describe what the migration does, e.g. add_domain_configs_table").
file_template = %%(year)d%%(month).2d%%(day).2d_%%(slug)s

[post_write_hooks]
# Hooks intentionally omitted — formatter choices belong to project lint config.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
